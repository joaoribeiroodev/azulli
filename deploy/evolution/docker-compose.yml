# Evolution API + Manager + Postgres + Redis — Oracle Cloud / VPS
# Uso: cp .env.example .env && docker compose up -d

services:
  api:
    container_name: evolution_api
    image: evoapicloud/evolution-api:latest
    restart: unless-stopped
    depends_on:
      - redis
      - evolution-postgres
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - evolution-net
    env_file:
      - .env

  frontend:
    container_name: evolution_frontend
    image: evoapicloud/evolution-manager:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    networks:
      - evolution-net

  redis:
    container_name: evolution_redis
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --port 6379 --appendonly yes
    volumes:
      - evolution_redis:/data
    networks:
      evolution-net:
        aliases:
          - evolution-redis

  evolution-postgres:
    container_name: evolution_postgres
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - .env
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - listen_addresses=*
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE}
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - evolution-net

volumes:
  evolution_instances:
  evolution_redis:
  postgres_data:

networks:
  evolution-net:
    driver: bridge
